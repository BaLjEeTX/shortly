name: deploy

# Triggers: every push to main, plus a manual "Run workflow" button.
# Frontend deployment is handled separately by Vercel's GitHub integration —
# this workflow only builds/deploys the backend image.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository_owner }}/shortly-backend

jobs:
  # 1. Verify backend + frontend build cleanly. Fast fail before
  #    we waste time pushing broken images.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Backend — package
        working-directory: backend
        run: mvn -B clean package -DskipTests

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — install + build (sanity check; Vercel does its own build)
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # 2. Build the backend Docker image and push to GHCR.
  build-backend:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # 3. SSH into EC2 and run `docker compose pull && up -d`.
  #    Required repo secrets:  EC2_HOST, EC2_USER, EC2_SSH_KEY
  deploy:
    needs: build-backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/shortly
            docker compose pull backend
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✓ Deployed ${{ github.sha }}"
