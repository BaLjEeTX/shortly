spring:
  application:
    name: shortly-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shortly}
    username: ${DB_USER:shortly}
    password: ${DB_PASSWORD:shortly}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1800000
  jpa:
    open-in-view: false        # CRITICAL: prevents N+1 in views, forces explicit fetching
    hibernate:
      ddl-auto: validate       # Flyway owns the schema; Hibernate verifies only
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          time_zone: UTC
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: email, profile

server:
  port: 8080
  shutdown: graceful           # complete in-flight requests before shutdown
  compression:
    enabled: true
  forward-headers-strategy: framework

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5174}
  cors:
    # Comma-separated list of allowed origins. Override in prod via CORS_ALLOWED_ORIGINS env var.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-256-bits-long}
    access-token-ttl: PT15M    # 15 minutes
    refresh-token-ttl: P7D     # 7 days
  cache:
    url-ttl: PT24H
    not-found-ttl: PT1M        # negative caching to prevent enumeration
  rate-limit:
    redirect-per-ip-per-min: 600
    create-per-user-per-min: 30
  click-buffer:
    capacity: 10000
    flush-interval-ms: 1000
    batch-size: 500

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

logging:
  level:
    com.shortly: INFO
    org.hibernate.SQL: WARN
