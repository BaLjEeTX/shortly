services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shortly
      POSTGRES_USER: shortly
      POSTGRES_PASSWORD: shortly
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "shortly"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/shortly
      DB_USER: shortly
      DB_PASSWORD: shortly
      REDIS_HOST: redis
      JWT_SECRET: dev-secret-key-must-be-at-least-32-chars-long
      APP_BASE_URL: http://localhost:8080
      APP_FRONTEND_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:80"]
    depends_on: [api]

  # ─── Observability stack ─────────────────────────────────────────
  # Loki stores logs, Promtail tails Docker container stdout/stderr,
  # Prometheus scrapes /actuator/prometheus, Grafana ties them together.
  #
  # Browse to http://localhost:3001 (admin / admin) and open the
  # "Shortly — Overview" dashboard. To live-tail the api alone:
  #   {service="api"}
  # To find errors in the last 5m:
  #   {service="api", level="ERROR"}

  loki:
    image: grafana/loki:3.1.0
    command: -config.file=/etc/loki/loki-config.yml
    ports: ["3100:3100"]
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  promtail:
    image: grafana/promtail:3.1.0
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtaildata:/tmp
    depends_on:
      loki: { condition: service_healthy }

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      api: { condition: service_started }

  grafana:
    image: grafana/grafana:11.2.0
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"          # easier local browsing
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_LOG_LEVEL: warn
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      loki: { condition: service_healthy }
      prometheus: { condition: service_started }

volumes:
  pgdata:
  lokidata:
  promtaildata:
  prometheusdata:
  grafanadata:
